name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are reviewing a pull request for the Harmony project — a search-engine-indexable
            Discord-like chat application.
            Review this PR thoroughly against the following criteria:

            **Best Practices**
            - Ensure changes align with expectations defined in architecture/dev spec documents.
            - If the PR is targeting an issue, make sure it fulfills all issue requirements.

            **Code Quality & Style**
            - TypeScript strict mode; no implicit `any`; unused vars/params must be prefixed with `_`
            - Prettier formatting: 100-char line width, semicolons, single quotes, trailing commas
            - ESLint 9 rules must be respected
            - Backend: camelCase for code, snake_case in DB (mapped via Prisma `@map()`)
            - Frontend: React components in PascalCase, hooks prefixed `use`

            **Security**
            - JWT tokens must not be stored insecurely or leaked in logs
            - Auth middleware must be applied to all protected tRPC/REST routes
            - No raw SQL that could lead to injection — use Prisma query builder
            - No secrets/credentials hardcoded

            **Project Conventions**
            - REST routes are for public/unauthenticated access (SEO crawlers); tRPC is for
              authenticated admin operations — do not mix these
            - Prisma `ChannelVisibility` enum values (PUBLIC_INDEXABLE, PUBLIC_NO_INDEX, PRIVATE)
              must not be renamed or altered
            - New DB fields must follow snake_case naming and be added to `schema.prisma`
            - Keep Section 3 (Class Diagram) and Section 4 (List of Classes) in docs in sync
              if architectural changes are made

            **Test Coverage**
            - Backend changes must include or update Jest tests in `tests/**/*.test.ts`
            - Tests must be able to run against a real PostgreSQL + Redis instance
            - Do not leave test files that import non-existent modules

            Note: The PR branch is already checked out in the current working directory.

            Post exactly ONE formal review — batch all inline comments under that single review.
            Do not post multiple `gh pr comment` calls or multiple review submissions; consolidate
            everything into one review to prevent notification spam.
            Use `mcp__github_inline_comment__create_inline_comment` to attach inline comments to the review.
            Only post GitHub comments - don't submit review text as messages.

            After your review, submit a formal GitHub PR review using the `gh` CLI:
            - Use `gh pr review <PR_NUMBER> --approve -b "<summary>"` if the PR is ready to merge
            - Use `gh pr review <PR_NUMBER> --request-changes -b "<detailed feedback>"` if changes are needed
            - Include specific file:line references in your feedback

            # Do NOT leave nitpick-only comments; focus on issues that matter
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
